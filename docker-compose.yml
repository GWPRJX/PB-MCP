services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pb_mcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/app/src
      - ./dashboard/dist:/app/dashboard/dist
      - /app/node_modules
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://app_login:changeme@postgres:5432/pb_mcp
      - DATABASE_MIGRATION_URL=postgres://postgres:postgres@postgres:5432/pb_mcp
      - MIGRATION_ALERT=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: npx tsx watch src/index.ts

volumes:
  postgres_data:
